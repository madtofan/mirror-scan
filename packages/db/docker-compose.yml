name: mirror-scan

services:
  postgres:
    image: postgres
    container_name: mirror-scan-postgres
    environment:
      POSTGRES_DB: mirror-scan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - mirror-scan_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mirror-scan_postgres_data:
